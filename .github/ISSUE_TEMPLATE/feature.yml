name: Feature request
description: Propose a new capability or improvement.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Before filing**: bigger ideas often deserve a quick brainstorm
        (see Felix) before a feature request. Tiny improvements can land
        straight as PRs without an issue.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain or limitation does this address? Outcome-focused, not solution-focused.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How would it work from the user's point of view? Skip implementation details.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What did you weigh against this proposal, and why this one?

  - type: input
    id: repo
    attributes:
      label: Which repo
      placeholder: "angelwerk / angelwerk-www / new repo"
    validations:
      required: true
